services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: b7estoque
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d b7estoque"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/b7estoque
      BASE_URL: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx drizzle-kit migrate && npx tsx src/db/seed.ts && npx tsx src/server.ts"
    volumes:
      - avatars:/app/public/avatars

volumes:
  postgres_data:
  avatars:
